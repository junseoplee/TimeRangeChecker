server:
  port: 8080

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://checker.ctwoami000pb.ap-northeast-2.rds.amazonaws.com:3306
    username: admin
    password: adminpassword

  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  data:
    redis:
      host: redis-cache
      port: 6379

logging:
  level:
    '[org.springframework.boot.web]': INFO
