version: '3.8'

services:
  # Vue.js 프론트엔드 (개발용)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: timerangechecker-frontend
    ports:
      - "5173:5173"
    environment:
      # 로컬 백엔드 서버 (별도 실행 필요)
      - VITE_API_BASE_URL=http://localhost:8080
      # 또는 배포된 서버 사용
      # - VITE_API_BASE_URL=https://your-backend-domain.com
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped 