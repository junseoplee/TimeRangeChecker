name: TimeRangeChecker Backend Deploy
on:
  push:
    branches:
      - backend
    paths:
      - 'backend/**'
      - '.github/workflows/TimeRangeChecker_Backend_Deploy.yml'
  pull_request:
    branches:
      - backend
    paths:
      - 'backend/**'

jobs:
  develop:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode Dev Secret
        env:
          DEV_SECRET: ${{ secrets.APPLICATION_DEV_YML }}
        run: |
          mkdir -p backend/src/main/resources
          echo "$DEV_SECRET" | base64 --decode > backend/src/main/resources/application-dev.yml

      - name: Grant Gradlew Execute
        run: chmod +x ./backend/gradlew

      - name: Build with Gradle
        working-directory: ./backend
        run: ./gradlew clean compileJava build
        env:
          SPRING_PROFILES_ACTIVE: dev

      - name: Docker Build & Push
        working-directory: ./backend
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login --username "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t "${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest" .
          docker push "${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest"

      - name: Get Runner IP
        run: echo "RUNNER_IP=$(curl -s ifconfig.me)" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-northeast-2

      - name: Open SSH Port
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr "${{ env.RUNNER_IP }}/32"

      - name: Prepare SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare Remote Directory
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            rm -f ~/*.tar.gz
            mkdir -p ~/danthis
            sudo chown -R $(whoami):$(whoami) ~/danthis
            chmod -R u+rw ~/danthis
          EOF

      - name: Upload docker-compose via SSH
        run: |
          base64 -w0 backend/docker-compose.yml | \
            ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} \
              'base64 -d > ~/danthis/docker-compose.yml'

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            cd ~/danthis
            docker-compose pull
            docker-compose up -d --force-recreate
          EOF

      - name: Close SSH Port
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr "${{ env.RUNNER_IP }}/32"
